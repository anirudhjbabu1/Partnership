<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnership Sanctuary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-rose-50 min-h-screen text-rose-950 p-4 md:p-8">

    <div id="gate" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-rose-950/10 backdrop-blur-sm">
        <div class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center space-y-8 border border-rose-100">
            <h1 class="text-3xl font-extrabold text-rose-900 tracking-tight">Sanctuary Gate</h1>
            
            <div id="step1" class="space-y-4">
                <input id="sessInp" placeholder="Enter Sanctuary ID" class="w-full p-4 bg-rose-50 rounded-2xl border border-rose-100 text-center font-bold outline-none focus:border-rose-300">
                <button onclick="nextStep(2)" class="w-full py-4 bg-rose-500 text-white font-bold rounded-2xl hover:bg-rose-600 transition-all">Unlock Sanctuary</button>
            </div>

            <div id="step2" class="hidden space-y-4">
                <p class="text-sm text-rose-500">Identify yourself</p>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="setIdentity('Partner1')" class="py-4 border border-rose-200 rounded-2xl hover:bg-rose-50 transition-all font-semibold">Partner 1</button>
                    <button onclick="setIdentity('Partner2')" class="py-4 border border-rose-200 rounded-2xl hover:bg-rose-50 transition-all font-semibold">Partner 2</button>
                </div>
            </div>

            <div id="step3" class="hidden space-y-4">
                <p class="text-sm text-rose-500">Security Handshake</p>
                <button onclick="activate()" class="w-full py-4 bg-emerald-500 text-white font-bold rounded-2xl hover:bg-emerald-600 transition-all animate-pulse">Activate Sanctuary</button>
            </div>
            
            <p id="error" class="text-xs text-rose-400 font-medium"></p>
        </div>
    </div>

    <div id="app" class="hidden max-w-5xl mx-auto space-y-6">
        <header class="glass p-6 rounded-[2rem] border border-rose-100 flex items-center justify-between shadow-sm">
            <div>
                <h1 class="text-xl font-extrabold text-rose-900">Sanctuary</h1>
                <p id="partnerStatus" class="text-[10px] text-rose-400 font-bold uppercase tracking-widest"></p>
            </div>
            <div id="connectionStatus" class="px-4 py-2 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-bold uppercase tracking-wider">Active</div>
        </header>

        <div id="controlHub" class="bg-white p-6 rounded-[2rem] shadow-sm border border-rose-100 grid grid-cols-2 md:grid-cols-4 gap-4">
            <button onclick="setPanic(true)" class="col-span-2 md:col-span-4 bg-rose-600 text-white py-4 rounded-2xl font-bold animate-pulse hover:bg-rose-700">🚨 PANIC BUTTON (SOS)</button>
            <select id="statusSelect" onchange="updateStatus(this.value)" class="col-span-2 p-4 bg-rose-50 rounded-2xl font-bold text-rose-900 outline-none border border-rose-100">
                <option value="Available">Available</option>
                <option value="In Meeting">In Meeting</option>
                <option value="Going for Meeting">Going for Meeting</option>
                <option value="Going for Food">Going for Food</option>
            </select>
            <button onclick="shareLocation()" class="p-4 bg-rose-100 rounded-2xl font-bold text-rose-900">📍 Share Location</button>
            <button onclick="sendQuickMsg('I love you')" class="p-4 bg-rose-100 rounded-2xl font-bold text-rose-900">❤️</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <textarea id="editor" oninput="saveData()" class="lg:col-span-2 w-full h-[50vh] p-8 bg-white rounded-[2rem] shadow-sm border border-rose-100 text-sm font-mono focus:ring-2 focus:ring-rose-200 resize-none outline-none" placeholder="Begin your journey..."></textarea>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-rose-100 flex flex-col h-[50vh]">
                <div id="chatBox" class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2 text-sm"></div>
                <input id="msgInput" onkeydown="if(event.key==='Enter') sendMsg()" placeholder="Whisper..." class="w-full p-4 bg-rose-50 rounded-2xl text-sm outline-none border border-rose-100">
            </div>
        </div>
    </div>

    <div id="panicModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-red-600/90 backdrop-blur-md">
        <div class="bg-white p-12 rounded-[2rem] text-center space-y-6 animate-bounce">
            <h2 class="text-5xl font-black text-red-600">EMERGENCY!</h2>
            <p id="panicMsg" class="text-xl font-bold text-rose-900">Your partner needs help!</p>
            <button onclick="setPanic(false)" class="bg-rose-900 text-white px-8 py-4 rounded-full font-bold">Dismiss Alert</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, setDoc, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBTnz2pfLZIx23i8RrcZj_u_K0Mlt6_syY",
            authDomain: "partnership-92fda.firebaseapp.com",
            projectId: "partnership-92fda",
            storageBucket: "partnership-92fda.firebasestorage.app",
            messagingSenderId: "166296175418",
            appId: "1:166296175418:web:1a374bfaab63d2f6ff4603"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        let sessionId = "", myIdentity = "";

        window.nextStep = (step) => {
            if(step === 2) {
                sessionId = document.getElementById('sessInp').value.trim();
                if(!sessionId) return (document.getElementById('error').innerText = "Please enter an ID");
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            }
        };

        window.setIdentity = (id) => {
            myIdentity = id;
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
        };

        window.activate = async () => {
            const ref = doc(db, 'PartnershipSessions', sessionId);
            await setDoc(ref, { active: true }, { merge: true });
            document.getElementById('gate').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            setupSync();
        };
            
        window.setPanic = async (val) => {
            await updateDoc(doc(db, 'PartnershipSessions', sessionId), { panic: val });
        };

        window.updateStatus = async (status) => {
            await updateDoc(doc(db, 'PartnershipSessions', sessionId), { [myIdentity + '_status']: status });
        };

        window.shareLocation = () => {
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const link = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    await updateDoc(doc(db, 'PartnershipSessions', sessionId), { 
                        chat: arrayUnion({ text: "📍 My location: " + link, sender: myIdentity, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) }) 
                    });
                });
            }
        };

        window.sendQuickMsg = async (text) => {
            await updateDoc(doc(db, 'PartnershipSessions', sessionId), { 
                chat: arrayUnion({ text: text, sender: myIdentity, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) }) 
            });
        };

        function setupSync() {
            onSnapshot(doc(db, 'PartnershipSessions', sessionId), (snap) => {
                if(!snap.exists()) return;
                const data = snap.data();
                if(data.code !== document.getElementById('editor').value) document.getElementById('editor').value = data.code || "";
                
                if(data.panic) document.getElementById('panicModal').classList.remove('hidden');
                else document.getElementById('panicModal').classList.add('hidden');

                renderChat(data.chat || []);
                const partner = myIdentity === 'Partner1' ? 'Partner2' : 'Partner1';
                document.getElementById('partnerStatus').innerText = data[partner] ? `${partner} is ${data[partner+'_status'] || 'Online'}` : `${partner} is Offline`;
            });
        }

        window.saveData = async () => {
            await updateDoc(doc(db, 'PartnershipSessions', sessionId), { code: document.getElementById('editor').value });
        };

        window.sendMsg = async () => {
            const input = document.getElementById('msgInput');
            if(!input.value) return;
            const msg = { text: input.value, sender: myIdentity, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
            await updateDoc(doc(db, 'PartnershipSessions', sessionId), { chat: arrayUnion(msg) });
            input.value = "";
            input.value = "";
        };

        function renderChat(chat) {
            document.getElementById('chatBox').innerHTML = chat.map(m => `
                <div class="${m.sender === myIdentity ? 'text-right' : 'text-left'}">
                    <p class="text-[10px] text-rose-400 font-bold">${m.sender}</p>
                    <p class="${m.sender === myIdentity ? 'bg-rose-500 text-white' : 'bg-rose-100'} p-3 rounded-2xl inline-block mt-1">${m.text}</p>
                </div>`).join('');
        }
    </script>
</body>
</html>
