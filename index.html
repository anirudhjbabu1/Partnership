<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnership Sanctuary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-rose-50 min-h-screen text-rose-950">

    <div id="gate" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-rose-950/20 backdrop-blur-sm">
        <div class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center space-y-6 border border-rose-100">
            <h1 class="text-2xl font-extrabold text-rose-900">Sanctuary Setup</h1>
            <div id="setup-step1">
                <input id="sessInp" placeholder="Sanctuary ID" class="w-full p-4 mb-4 bg-rose-50 rounded-2xl text-center font-bold outline-none border border-rose-100">
                <input id="p1Name" placeholder="Your Name" class="w-full p-4 mb-4 bg-rose-50 rounded-2xl text-center font-bold outline-none border border-rose-100">
                <input id="p2Name" placeholder="Partner Name" class="w-full p-4 mb-6 bg-rose-50 rounded-2xl text-center font-bold outline-none border border-rose-100">
                <button onclick="initializeSanctuary()" class="w-full py-4 bg-rose-500 text-white font-bold rounded-2xl">Enter Sanctuary</button>
            </div>
            <p id="error" class="text-xs text-rose-400"></p>
        </div>
    </div>

    <div id="app" class="hidden flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-rose-100 p-6 flex flex-col justify-between">
            <div>
                <h2 class="font-black text-rose-900 mb-8">SANCTUARY</h2>
                <nav id="pageNav" class="space-y-2">
                    <!-- Dynamic links will be injected here -->
                </nav>
                <button onclick="addCustomPage()" class="mt-4 w-full text-left text-sm font-bold text-rose-400 hover:text-rose-600">+ Add Page</button>
            </div>
            <div id="reminders" class="bg-rose-50 p-4 rounded-2xl text-xs">
                <h3 class="font-bold mb-2">Reminders</h3>
                <div id="reminderList" class="space-y-1 text-rose-600"></div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8 overflow-y-auto">
            <header class="flex justify-between items-center mb-8">
                <h1 id="viewTitle" class="text-3xl font-black text-rose-900">Home</h1>
                <div class="flex gap-4">
                    <button onclick="setPanic(true)" class="bg-rose-600 text-white px-4 py-2 rounded-xl text-sm font-bold">Panic</button>
                </div>
            </header>

            <div id="content" class="space-y-6">
                <textarea id="editor" oninput="saveCurrentPage()" class="w-full h-[60vh] p-8 bg-white rounded-[2rem] shadow-sm border border-rose-100 resize-none outline-none" placeholder="Write here..."></textarea>
                <div class="bg-white p-6 rounded-[2rem] border border-rose-100">
                    <input id="msgInput" onkeydown="if(event.key==='Enter') sendMsg()" placeholder="Chat with partner..." class="w-full p-4 bg-rose-50 rounded-2xl">
                    <div id="chatBox" class="mt-4 space-y-2"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, setDoc, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBTnz2pfLZIx23i8RrcZj_u_K0Mlt6_syY",
            authDomain: "partnership-92fda.firebaseapp.com",
            projectId: "partnership-92fda",
            storageBucket: "partnership-92fda.firebasestorage.app",
            messagingSenderId: "166296175418",
            appId: "1:166296175418:web:1a374bfaab63d2f6ff4603"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        let sessionId = "", currentView = "Home";
        let state = { pages: { Home: "" }, chat: [], reminders: [] };

        window.initializeSanctuary = async () => {
            sessionId = document.getElementById('sessInp').value.trim();
            const p1 = document.getElementById('p1Name').value.trim();
            const p2 = document.getElementById('p2Name').value.trim();
            if(!sessionId || !p1 || !p2) return (document.getElementById('error').innerText = "All fields required");
            
            await setDoc(doc(db, 'PartnershipSessions', sessionId), { 
                partners: { p1, p2 }, pages: { Home: "" }, reminders: [], chat: [] 
            }, { merge: true });
            
            document.getElementById('gate').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            setupSync();
        };

        window.setupSync = () => {
            onSnapshot(doc(db, 'PartnershipSessions', sessionId), (snap) => {
                if(!snap.exists()) return;
                state = snap.data();
                renderNav();
                renderView();
                renderChat();
                renderReminders();
            });
        };

        window.renderNav = () => {
            const nav = document.getElementById('pageNav');
            nav.innerHTML = Object.keys(state.pages).map(key => `
                <button onclick="switchView('${key}')" class="block w-full text-left p-2 rounded-lg font-bold text-rose-900 hover:bg-rose-50">${key}</button>
            `).join('');
        };

        window.switchView = (view) => {
            currentView = view;
            renderView();
        };

        window.renderView = () => {
            document.getElementById('viewTitle').innerText = currentView;
            document.getElementById('editor').value = state.pages[currentView] || "";
        };

        window.saveCurrentPage = async () => {
            await updateDoc(doc(db, 'PartnershipSessions', sessionId), { 
                [`pages.${currentView}`]: document.getElementById('editor').value 
            });
        };

        window.addCustomPage = async () => {
            const name = prompt("Enter page name (e.g., Travel, Career):");
            if(name) {
                await updateDoc(doc(db, 'PartnershipSessions', sessionId), { [`pages.${name}`]: "" });
            }
        };

        window.sendMsg = async () => {
            const input = document.getElementById('msgInput');
            await updateDoc(doc(db, 'PartnershipSessions', sessionId), { 
                chat: arrayUnion({ text: input.value, sender: "User", time: new Date().toLocaleTimeString() }) 
            });
            input.value = "";
        };

        function renderChat() {
            document.getElementById('chatBox').innerHTML = (state.chat || []).map(m => `
                <p class="text-xs bg-rose-50 p-2 rounded">${m.text}</p>
            `).join('');
        }

        function renderReminders() {
            document.getElementById('reminderList').innerHTML = (state.reminders || []).map(r => `<p>- ${r}</p>`).join('');
        }
    </script>
</body>
</html>
