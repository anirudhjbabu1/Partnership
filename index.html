<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnership | Our Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #fdf2f8; color: #4c0519; }
        .card { background: #ffffff; border: 1px solid #ffe4e6; box-shadow: 0 10px 25px -5px rgba(225, 29, 72, 0.1); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- Auth View -->
    <div id="authView" class="max-w-md mx-auto mt-20 card p-10 rounded-[2rem] text-center">
        <h1 class="text-4xl font-bold mb-2 text-rose-900">Partnership</h1>
        <p class="text-rose-400 mb-8">Log in to enter your shared space</p>
        <input id="email" type="email" placeholder="Email" class="w-full p-4 mb-3 bg-rose-50 rounded-2xl border-none">
        <input id="password" type="password" placeholder="Password" class="w-full p-4 mb-6 bg-rose-50 rounded-2xl border-none">
        <button id="loginBtn" class="w-full bg-rose-900 text-white py-4 rounded-2xl font-semibold hover:bg-rose-800">Enter Partnership</button>
    </div>

    <!-- App View -->
    <div id="appView" class="hidden max-w-5xl mx-auto">
        <!-- SOS Overlay -->
        <div id="sosOverlay" class="hidden fixed inset-0 z-50 bg-red-600 flex flex-col items-center justify-center text-white p-8 animate-pulse">
            <h1 class="text-6xl font-black mb-4">🚨 SOS ALERT 🚨</h1>
            <p id="sosCoordDisplay" class="text-2xl mb-8 font-medium">Location data loading...</p>
            <button onclick="document.getElementById('sosOverlay').classList.add('hidden')" class="bg-white text-red-600 px-8 py-4 rounded-2xl font-bold text-xl hover:bg-red-50">Dismiss Alert</button>
        </div>

        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-bold text-rose-950">Partnership</h2>
                <p class="text-rose-500">Synced, secure, and private.</p>
            </div>
            <button id="logoutBtn" class="px-5 py-2 rounded-full bg-rose-50 text-rose-600 text-sm hover:bg-rose-100">Leave</button>
        </header>

        <!-- Room Entry Section -->
        <div id="setupRoom" class="hidden card p-12 rounded-[2rem] text-center max-w-lg mx-auto">
            <h3 class="text-xl font-bold mb-6 text-rose-900">Initialize Partnership</h3>
            <input id="roomInput" type="text" placeholder="Room ID" class="w-full p-4 mb-3 bg-rose-50 rounded-2xl">
            <input id="roomPass" type="password" placeholder="Password" class="w-full p-4 mb-6 bg-rose-50 rounded-2xl">
            <button id="roomActionBtn" class="w-full bg-rose-900 text-white py-4 rounded-2xl font-semibold hover:bg-rose-800">Join Partnership</button>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden grid grid-cols-1 md:grid-cols-12 gap-8">
            <div class="md:col-span-4 space-y-6">
                <div class="card p-6 rounded-[2rem]">
                    <h3 class="font-bold text-rose-900 mb-4">Partner Status</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="updateStatus('In Meeting')" class="bg-rose-50 p-2 rounded-lg text-xs hover:bg-rose-100">Meeting</button>
                        <button onclick="updateStatus('In Bath')" class="bg-rose-50 p-2 rounded-lg text-xs hover:bg-rose-100">Bath</button>
                        <button onclick="updateStatus('Studying')" class="bg-rose-50 p-2 rounded-lg text-xs hover:bg-rose-100">Studying</button>
                        <button onclick="updateStatus('Online')" class="bg-rose-50 p-2 rounded-lg text-xs hover:bg-rose-100">Online</button>
                    </div>
                </div>
            </div>

            <div class="md:col-span-8 card p-8 rounded-[2rem] flex flex-col h-[500px]">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-rose-900">Live Feed</h3>
                    <div class="flex gap-2">
                        <button id="coachBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg">AI Coach</button>
                        <button id="sosBtn" class="bg-red-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg">SOS</button>
                    </div>
                </div>
                <div id="chatBox" class="flex-1 bg-rose-50/50 rounded-2xl p-6 mb-4 overflow-y-auto space-y-3"></div>
                <div class="flex gap-2">
                    <input id="msgInput" type="text" placeholder="Message..." class="flex-1 p-4 bg-rose-50 rounded-2xl border-none">
                    <button id="sendBtn" class="bg-rose-900 text-white px-6 py-4 rounded-2xl font-bold">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBTnz2pfLZIx23i8RrcZj_u_K0Mlt6_syY",
            authDomain: "partnership-92fda.firebaseapp.com",
            projectId: "partnership-92fda",
            storageBucket: "partnership-92fda.firebasestorage.app",
            messagingSenderId: "166296175418",
            appId: "1:166296175418:web:1a374bfaab63d2f6ff4603"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'default-app-id';
        let currentRoomId = null;

        onAuthStateChanged(auth, u => {
            if(u) {
                document.getElementById('authView').classList.add('hidden');
                document.getElementById('appView').classList.remove('hidden');
                checkUserRegistry(u.uid);
            } else {
                document.getElementById('authView').classList.remove('hidden');
                document.getElementById('appView').classList.add('hidden');
            }
        });

        document.getElementById('loginBtn').onclick = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, e, p).catch(() => createUserWithEmailAndPassword(auth, e, p));
        };
        
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        async function checkUserRegistry(uid) {
            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms_registry', uid));
            if(snap.exists()) enterDashboard(snap.data().roomId);
            else document.getElementById('setupRoom').classList.remove('hidden');
        }

        async function enterDashboard(id) {
            currentRoomId = id;
            document.getElementById('setupRoom').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');

            onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'rooms', id, 'chat'), orderBy('timestamp', 'asc')), (snap) => {
                const box = document.getElementById('chatBox');
                box.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    box.innerHTML += `<div class="p-3 bg-white rounded-xl shadow-sm text-sm border border-rose-100"><b>${d.sender}:</b> ${d.text}</div>`;
                    
                    if (d.sender === '🚨 SOS') {
                        document.getElementById('sosCoordDisplay').innerText = d.text;
                        document.getElementById('sosOverlay').classList.remove('hidden');
                    }
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        document.getElementById('roomActionBtn').onclick = async () => {
            const id = document.getElementById('roomInput').value.trim().toUpperCase();
            const pass = document.getElementById('roomPass').value.trim();
            if(!id || !pass) return;
            
            const rRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', id);
            const snap = await getDoc(rRef);
            if(snap.exists() && snap.data().password !== pass) return alert("Wrong Password");
            
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms_registry', auth.currentUser.uid), { roomId: id });
            if(!snap.exists()) await setDoc(rRef, { password: pass });
            enterDashboard(id);
        };

        document.getElementById('sendBtn').onclick = async () => {
            const i = document.getElementById('msgInput');
            if(i.value) {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId, 'chat'), {
                    sender: 'You',
                    text: i.value,
                    timestamp: serverTimestamp()
                });
                i.value = '';
            }
        };

        document.getElementById('sosBtn').onclick = () => {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const {latitude, longitude} = pos.coords;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId, 'chat'), {
                    sender: '🚨 SOS',
                    text: `HELP! My location is: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}`,
                    timestamp: serverTimestamp()
                });
            }, () => alert("Location access required for SOS."));
        };

        window.updateStatus = async (status) => {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId, 'chat'), {
                sender: 'Status',
                text: `Status updated to: ${status}`,
                timestamp: serverTimestamp()
            });
        };
    </script>
</body>
</html>
