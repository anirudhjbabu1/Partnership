<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnership Sanctuary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-rose-50 min-h-screen text-rose-950 p-4 md:p-8">

    <!-- Auth Gateway -->
    <div id="authGateOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-rose-950/20 backdrop-blur-md p-4">
        <div class="bg-white p-8 rounded-[2rem] max-w-sm w-full shadow-2xl space-y-6 text-center border border-rose-100">
            <div class="w-16 h-16 bg-rose-100 rounded-full flex items-center justify-center mx-auto text-3xl">✨</div>
            <h1 class="text-2xl font-extrabold text-rose-900">Welcome Home</h1>
            <p class="text-rose-600 text-sm">Your private sanctuary is ready.</p>
            <button id="authBtn" onclick="initAuth()" class="w-full py-4 bg-rose-500 text-white font-bold rounded-2xl hover:bg-rose-600 transition-all shadow-lg shadow-rose-200">Enter Sanctuary</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden max-w-5xl mx-auto space-y-6">
        <!-- Header -->
        <header class="glass p-6 rounded-[2rem] shadow-sm border border-rose-100 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-extrabold text-rose-900">Our Sanctuary</h1>
                <p id="loveTimer" class="text-xs font-bold uppercase tracking-widest text-rose-400">Syncing...</p>
            </div>
            <div id="avatarDisplay" class="flex gap-1"></div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Shared Editor -->
            <div class="lg:col-span-2 bg-white p-6 rounded-[2rem] shadow-sm border border-rose-100 space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="font-bold text-slate-800">Shared Workspace</h2>
                    <span class="text-[10px] bg-emerald-50 text-emerald-600 px-2 py-1 rounded-full uppercase font-bold tracking-wider">Live Active</span>
                </div>
                <textarea id="editor" oninput="pushCode()" class="w-full h-80 p-6 bg-rose-50/50 rounded-2xl text-sm font-mono focus:ring-2 focus:ring-rose-200 outline-none border border-rose-100 resize-none transition-all" placeholder="Share thoughts, plans, or sweet notes here..."></textarea>
            </div>
            
            <!-- Chat -->
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-rose-100 flex flex-col h-[400px]">
                <h2 class="font-bold text-slate-800 mb-4">Messages</h2>
                <div id="chatBox" class="flex-1 overflow-y-auto space-y-3 mb-4">
                    <!-- Messages go here -->
                </div>
                <div class="relative">
                    <input id="msgInput" onkeydown="if(event.key==='Enter') sendMsg()" placeholder="Send a note..." class="w-full p-4 pr-12 bg-rose-50 rounded-2xl text-sm outline-none border border-rose-100">
                    <button onclick="sendMsg()" class="absolute right-2 top-2 p-2 bg-rose-500 text-white rounded-xl">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // FIREBASE CONFIG - REPLACE WITH YOUR KEYS
        const firebaseConfig = {
            apiKey: "AIzaSyBTnz2pfLZIx23i8RrcZj_u_K0Mlt6_syY",
            authDomain: "partnership-92fda.firebaseapp.com",
            projectId: "partnership-92fda",
            storageBucket: "partnership-92fda.firebasestorage.app",
            messagingSenderId: "166296175418",
            appId: "1:166296175418:web:1a374bfaab63d2f6ff4603"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const docRef = doc(db, 'Partnership', 'shared_state');

        const avatars = [
            '<div class="w-10 h-10 rounded-full bg-blue-100 border-2 border-white flex items-center justify-center shadow-sm">👨</div>',
            '<div class="w-10 h-10 rounded-full bg-pink-100 border-2 border-white flex items-center justify-center shadow-sm">👩</div>'
        ];

        window.initAuth = async () => {
            try {
                await signInAnonymously(auth);
                document.getElementById('authGateOverlay').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('avatarDisplay').innerHTML = avatars.join('');
                calculateTime();
                setupRealTimeSync();
            } catch (e) {
                console.error("Auth Error:", e);
                alert("Auth Error: " + e.message);
            }
        };

        function calculateTime() {
            const startDate = new Date('2024-01-01'); // Set your start date here
            const now = new Date();
            const diff = Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
            document.getElementById('loveTimer').innerText = `${diff} Days Together`;
        }

        function setupRealTimeSync() {
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (document.activeElement.id !== 'editor') document.getElementById('editor').value = data.code || "";
                    if(data.chat) renderChat(data.chat);
                }
            });
        }

        window.pushCode = async () => {
            await updateDoc(docRef, { code: document.getElementById('editor').value });
        };

        window.sendMsg = async () => {
            const input = document.getElementById('msgInput');
            if(!input.value) return;
            const msg = { sender: 'You', text: input.value, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
            const snap = await getDoc(docRef);
            const chat = snap.exists() ? (snap.data().chat || []) : [];
            await setDoc(docRef, { ...snap.data(), chat: [...chat.slice(-10), msg] });
            input.value = "";
        };

        function renderChat(chat) {
            const box = document.getElementById('chatBox');
            box.innerHTML = chat.map(m => `
                <div class="bg-rose-50 p-3 rounded-2xl text-xs">
                    <p class="font-bold text-rose-900">${m.sender}</p>
                    <p class="text-rose-700">${m.text}</p>
                    <p class="text-[9px] text-rose-300 mt-1">${m.time}</p>
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
